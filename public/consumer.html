<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JensonAI Consumer</title>
<style>
    body { background:#0a0a0a; color:white; font-family:Arial; padding:40px; }
    textarea { width:100%; height:120px; background:#111; color:white; border:2px solid #333; border-radius:10px; padding:15px; }
    button { padding:10px 25px; background:#00ffaa; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<h1>JensonAI</h1>

<p><strong>Type your question:</strong></p>
<textarea id="q"></textarea>
<button onclick="sendQuestion()">Submit</button>

<hr>

<p><strong>JensonAI Response:</strong></p>
<p id="answer" style="color:#00ffaa;"></p>

<script>
const ws = new WebSocket("wss://jensonai-online-production.up.railway.app");


ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "init") {
        document.getElementById("answer").innerText = data.answer;
    }

    if (data.type === "answer") {
        document.getElementById("answer").innerText = data.text;
    }
};

function sendQuestion() {
    ws.send(JSON.stringify({
        type: "question",
        text: document.getElementById("q").value
    }));
}
</script>

</body>
</html>
