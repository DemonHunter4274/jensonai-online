<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JensonAI Control Panel</title>
<style>
    body { background:#0a0a0a; color:white; font-family:Arial; padding:40px; }
    textarea { width:100%; height:120px; background:#111; color:white; border:2px solid #333; border-radius:10px; padding:15px; }
    button { padding:10px 25px; background:#00ffaa; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>

<h1>JensonAI Control Panel</h1>

<p><strong>Consumer Question:</strong></p>
<p id="question" style="background:#111; padding:15px; border-radius:10px;"></p>

<textarea id="answerBox" placeholder="Type your AI reply..."></textarea>
<button onclick="sendAnswer()">Send Reply</button>

<script>
const ws = new WebSocket("ws://localhost:8080");

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "init") {
        document.getElementById("question").innerText = data.question;
    }

    if (data.type === "question") {
        document.getElementById("question").innerText = data.text;
    }
};

function sendAnswer() {
    ws.send(JSON.stringify({
        type: "answer",
        text: document.getElementById("answerBox").value
    }));
}
</script>

</body>
</html>
